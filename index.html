<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Последний звонок</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      overflow-x: hidden;
    }

    /* Праздничные блёстки */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 0.7; }
      100% { transform: translateY(-120vh) scale(0.4); opacity: 0; }
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 34px;
      font-weight: 500;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .section {
      margin-top: 40px;
      border: 1px solid rgba(148,163,184,0.3);
      border-radius: 16px;
      padding: 20px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(4px);
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.9s ease forwards;
    }

    .section:nth-child(2) { animation-delay: .2s; }
    .section:nth-child(3) { animation-delay: .35s; }
    .section:nth-child(4) { animation-delay: .5s; }
    .section:nth-child(5) { animation-delay: .65s; }
    .section:nth-child(6) { animation-delay: .8s; }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .name {
      font-size: 20px;
      margin-bottom: 12px;
      color: #cbd5e1;
    }

    img {
      width: 100%;
      border-radius: 14px;
      margin-bottom: 14px;
      object-fit: cover;
      transform: scale(0.97);
      transition: 0.4s ease;
    }

    img:hover {
      transform: scale(1);
      filter: brightness(1.1);
    }

    .emoji {
      font-size: 26px;
      text-align: center;
      margin-top: 6px;
    }

    .end {
      margin-top: 50px;
      text-align: center;
      font-size: 14px;
      color: #94a3b8;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
      animation-delay: 1.2s;
    }
  </style>
</head>

<body>

  <!-- Блёстки -->
  <div class="particles">
    <script>
      for (let i = 0; i < 40; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.left = Math.random() * 100 + "vw";
        p.style.top = Math.random() * 100 + "vh";
        p.style.animationDelay = Math.random() * 6 + "s";
        p.style.opacity = 0.3 + Math.random() * 0.5;
        document.querySelector(".particles").appendChild(p);
      }
    </script>
  </div>

  <div class="wrap">

    <h1>Последний звонок</h1>

    <!-- СТАСЯ -->
    <div class="section">
      <div class="name">Стасе</div>
      <img src="stasya.jpg" alt="Стасе и Яра">
      <div class="emoji">✨💙🌸</div>
    </div>

    <!-- САША -->
    <div class="section">
      <div class="name">Саше</div>
      <img src="sasha.jpg" alt="Саша и Яра">
      <div class="emoji">🔥😎💫</div>
    </div>

    <!-- РИТА -->
    <div class="section">
      <div class="name">Рите</div>
      <img src="rita.jpg" alt="Рита и Яра">
      <div class="emoji">🌿🤍🌙</div>
    </div>

    <!-- АЛИНА -->
    <div class="section">
      <div class="name">Алине</div>
      <img src="alina.jpg" alt="Алина и Яра">
      <div class="emoji">⭐📸💛</div>
    </div>

    <!-- ВСЕ ВМЕСТЕ -->
    <div class="section">
      <div class="name">Мы все вместе</div>
      <img src="all.jpg" alt="Все вместе">
      <div class="emoji">💞🎉👭👭</div>
    </div>

    <div class="end">
      сделано с теплом — от Яры
    </div>

  </div>

</body>
</html>
