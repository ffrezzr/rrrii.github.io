<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Последний звонок</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f5f7fa;
      color: #1e293b;
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    /* ОБЛОЖКА */
    .cover {
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #b5fffc);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .cover h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
    }

    .cover p {
      font-size: 20px;
      margin-bottom: 30px;
      opacity: 0;
      animation: fadeIn 1.6s ease forwards;
    }

    .cover a {
      display: inline-block;
      padding: 14px 32px;
      font-size: 20px;
      font-weight: 600;
      color: #ff6ec7;
      background: white;
      border-radius: 30px;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      transition: 0.3s ease;
      opacity: 0;
      animation: fadeIn 2s ease forwards;
    }

    .cover a:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ПАДАЮЩИЕ ЧАСТИЦЫ */
    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);
      animation: fall 8s linear infinite;
      opacity: 0.8;
    }

    @keyframes fall {
      0% { transform: translateY(-10vh); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(110vh); opacity: 0; }
    }

    /* АЛЬБОМ */
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    h2 {
      font-size: 32px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #ff6ec7, #4facfe);
      -webkit-background-clip: text;
      color: transparent;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
    }

    .section {
      margin-top: 32px;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      opacity: 0;
      transform: translateY(25px);
      animation: slideUp 0.7s ease forwards;
      background-size: 200% 200%;
      animation-name: slideUp, gradientMove;
      animation-duration: 0.7s, 10s;
      animation-timing-function: ease, linear;
      animation-iteration-count: 1, infinite;
    }

    .section:nth-child(2) { animation-delay: .1s, 0s; }
    .section:nth-child(3) { animation-delay: .2s, 0s; }
    .section:nth-child(4) { animation-delay: .3s, 0s; }
    .section:nth-child(5) { animation-delay: .4s, 0s; }
    .section:nth-child(6) { animation-delay: .5s, 0s; }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #ff6ec7, #4facfe);
      -webkit-background-clip: text;
      color: transparent;
    }

    .emoji {
      text-align: center;
      margin-top: 10px;
      opacity: 0;
      animation: fadeInSong 1s ease forwards;
      animation-delay: .4s;
    }

    @keyframes fadeInSong {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .emoji a {
      font-size: 30px;
      text-decoration: none;
      transition: 0.3s ease;
    }

    .emoji a:hover {
      opacity: 0.7;
      transform: scale(1.1);
    }

    img {
      width: 100%;
      border-radius: 16px;
      margin-bottom: 12px;
      object-fit: cover;
      transition: 0.35s ease;
      box-shadow: 0 0 20px rgba(255,255,255,0.4);
    }

    img:hover {
      transform: scale(1.03);
      box-shadow: 0 0 30px rgba(255,255,255,0.8);
    }

    /* ГРАДИЕНТЫ ПОД КАЖДУЮ (АНИМИРУЕМЫЕ) */
    .stasya-bg {
      background-image: linear-gradient(135deg, #4facfe, #f9f586);
    }

    .sasha-bg {
      background-image: linear-gradient(135deg, #8e5b3a, #ff6b6b);
    }

    .rita-bg {
      background-image: linear-gradient(135deg, #c084fc, #a78bfa);
    }

    .alina-bg {
      background-image: linear-gradient(135deg, #fef08a, #60a5fa);
    }

    .end {
      margin-top: 40px;
      text-align: center;
      font-size: 15px;
      color: #334155;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
      animation-delay: .7s;
    }
  </style>
</head>

<body>

  <!-- ОБЛОЖКА -->
  <div class="cover">
    <h1>Последний звонок</h1>
    <p>маленькая история о нас</p>
    <a href="#album">войти</a>
  </div>

  <!-- СКРИПТ ДЛЯ ЧАСТИЦ -->
  <script>
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDelay = (Math.random() * 8) + 's';
      p.style.opacity = 0.4 + Math.random() * 0.6;
      p.style.width = p.style.height = (4 + Math.random() * 8) + 'px';
      document.querySelector('.cover').appendChild(p);
    }
  </script>

  <!-- АЛЬБОМ -->
  <div id="album" class="wrap">

    <h2>Наши моменты</h2>

    <!-- СТАСЯ -->
    <div class="section stasya-bg">
      <div class="name">Стасе</div>
      <img src="stasya.png">
      <div class="emoji">
        <a href="https://music.yandex.ru/track/3963490" target="_blank">💙🦌💛</a>
      </div>
    </div>

    <!-- САША -->
    <div class="section sasha-bg">
      <div class="name">Саше</div>
      <img src="sasha.jpg">
      <div class="emoji">
        <a href="https://music.yandex.ru/track/81159425" target="_blank">🍫🔥🌺</a>
      </div>
    </div>

    <!-- РИТА -->
    <div class="section rita-bg">
      <div class="name">Рите</div>
      <img src="rita.JPG">
      <div class="emoji">
        <a href="https://music.yandex.ru/track/208959" target="_blank">💜🌫️🌙</a>
      </div>
    </div>

    <!-- АЛИНА -->
    <div class="section alina-bg">
      <div class="name">Алине</div>
      <img src="alina.jpg">
      <div class="emoji">
        <a href="https://music.yandex.ru/track/208959" target="_blank">💛😂💙</a>
      </div>
    </div>

    <div class="end">
      сделано с теплом — от Яры
    </div>

  </div>

</body>
</html>
