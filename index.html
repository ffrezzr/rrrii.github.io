<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Последний звонок</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f5f7fa;
      color: #1e293b;
      scroll-behavior: smooth;
    }

    /* ОБЛОЖКА */
    .cover {
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #b5fffc);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      color: white;
    }

    .cover h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
    }

    .cover p {
      font-size: 20px;
      margin-bottom: 30px;
      opacity: 0;
      animation: fadeIn 1.6s ease forwards;
    }

    .cover a {
      display: inline-block;
      padding: 14px 32px;
      font-size: 20px;
      font-weight: 600;
      color: #ff6ec7;
      background: white;
      border-radius: 30px;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      transition: 0.3s ease;
      opacity: 0;
      animation: fadeIn 2s ease forwards;
    }

    .cover a:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* АЛЬБОМ */
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    h2 {
      font-size: 32px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #ff6ec7, #4facfe);
      -webkit-background-clip: text;
      color: transparent;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
    }

    .section {
      margin-top: 32px;
      background: white;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      opacity: 0;
      transform: translateY(25px);
      animation: slideUp 0.7s ease forwards;
    }

    .section:nth-child(2) { animation-delay: .1s; }
    .section:nth-child(3) { animation-delay: .2s; }
    .section:nth-child(4) { animation-delay: .3s; }
    .section:nth-child(5) { animation-delay: .4s; }
    .section:nth-child(6) { animation-delay: .5s; }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #ff6ec7, #4facfe);
      -webkit-background-clip: text;
      color: transparent;
    }

    img {
      width: 100%;
      border-radius: 16px;
      margin-bottom: 12px;
      object-fit: cover;
      transition: 0.35s ease;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    img:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .emoji {
      font-size: 28px;
      text-align: center;
      padding-bottom: 4px;
    }

    .end {
      margin-top: 40px;
      text-align: center;
      font-size: 15px;
      color: #334155;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
      animation-delay: .7s;
    }
  </style>
</head>

<body>

  <!-- ОБЛОЖКА -->
  <div class="cover">
    <h1>Последний звонок</h1>
    <p>маленькая история о нас</p>
    <a href="#album">войти</a>
  </div>

  <!-- АЛЬБОМ -->
  <div id="album" class="wrap">

    <h2>Наши моменты</h2>

    <div class="section">
      <div class="name">Стасе</div>
      <img src="stasya.png" alt="Стасе и Яра">
      <div class="emoji">💗✨🌸</div>
    </div>

    <div class="section">
      <div class="name">Саше</div>
      <img src="sasha.jpg" alt="Саша и Яра">
      <div class="emoji">🔥💥😎</div>
    </div>

    <div class="section">
      <div class="name">Рите</div>
      <img src="rita.JPG" alt="Рита и Яра">
      <div class="emoji">🌿🤍🌙</div>
    </div>

    <div class="section">
      <div class="name">Алине</div>
      <img src="alina.jpg" alt="Алина и Яра">
      <div class="emoji">⭐📸💛</div>
    </div>

    <div class="section">
      <div class="name">Мы все вместе</div>
      <img src="all.jpg" alt="Все вместе">
      <div class="emoji">💞🎉👭👭</div>
    </div>

    <div class="end">
      сделано с теплом — от Яры
    </div>

  </div>

</body>
</html>
